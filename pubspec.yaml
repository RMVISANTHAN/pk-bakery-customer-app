name: pk_bakery
description: PK Bakery - modern bakery delivery app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Firebase (Auth, FCM push notifications, Google Sign-In)
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.6
  firebase_messaging: ^14.9.4
  google_sign_in: ^6.2.1

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Maps & location (live order tracking)
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # Payments
  razorpay_flutter: ^1.3.7

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  carousel_slider: ^4.2.1
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
